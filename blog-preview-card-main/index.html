<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Outfit:wght@100..900&display=swap">
  <title>Frontend Mentor | Blog preview card</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
    body {
      background-color: hsl(47, 88%, 63%);
      font-family: 'Figtree', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
    }
    .blogcard {
      background-color: hsl(0, 0%, 100%);
      width: 320px;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 10px 10px hsl(0, 0%, 7%);
    }
    .content {
      border-radius: 20px;
      width: 100%;
    }
    .avatar {
      width: 30px;
    }
    .author {
      display: flex;
      font-style: center;
    }
    .button{
      background-color: hsl(47, 88%, 63%);
      width: 90px;
      font-weight: bold;
      text-align: center;
      border-radius: 5px;
      padding: 5px;
    }
    time {
      font-size: 15px;
    }
    p {
      font-size: 16px;
      color: hsl(0, 0%, 42%);
    }
    h2 {
      color: hsl(0, 0%, 7%); 
    }
    footer {
      position: absolute;
      bottom: 0px;
    }
  </style>
</head>
<body>

<article class="blogcard">
  <img class="content" src="./assets/images/illustration-article.svg" alt="illustration about html">

  <p class="button">Learning</p>

  <time datetime="2023-12-21">Published 21 Dec 2023</time>

  <h2>HTML & CSS foundations</h2>

  <p>These languages are the backbone of every website, defining structure, content, and presentation.</p>

  <div class="author">
<img class="avatar" src="./assets/images/image-avatar.webp" alt="photo of the author">  Greg Hooper
</div>
</article> 

<footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/jandersonhp">Jandão</a>.
  </footer>
</body>
</html>
